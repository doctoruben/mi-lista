<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚙️ Admin — MEMENTO</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Abril+Fatface&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(135deg, #0d0b09 0%, #1a1714 50%, #0d0b09 100%); font-family: 'Nunito', sans-serif; color: #f0ebe0; min-height: 100vh; }
    .wrap { max-width: 480px; margin: 0 auto; padding: 24px 16px 60px; }
    h1 { font-family: 'Abril Fatface', serif; font-size: 26px; color: #f5f0e8; margin-bottom: 4px; }
    .subtitle { color: #5a4a35; font-size: 13px; margin-bottom: 24px; }
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #1a1714; border-radius: 20px; padding: 24px; border: 1px solid #2e2720; margin-bottom: 16px; }
    .card h2 { font-family: 'Abril Fatface', serif; font-size: 20px; color: #f5f0e8; margin-bottom: 14px; }
    label { display: block; font-size: 11px; font-weight: 800; color: #8a7a60; letter-spacing: 0.5px; margin-bottom: 5px; margin-top: 12px; }
    label:first-of-type { margin-top: 0; }
    input[type=text], input[type=password] {
      width: 100%; background: #0d0b09; border: 1px solid #2e2720; border-radius: 10px;
      padding: 10px 14px; color: #f0ebe0; font-size: 15px; font-family: inherit; outline: none;
    }
    input[type=text]:focus, input[type=password]:focus { border-color: #c9a84c; }
    .btn { display: block; width: 100%; margin-top: 14px; background: linear-gradient(90deg,#c9a84c,#a8832a); color: #0d0b09; border: none; border-radius: 12px; padding: 12px; font-size: 15px; font-weight: 900; font-family: inherit; cursor: pointer; }
    .btn:active { opacity: 0.85; }
    .btn-danger { background: #450a0a; color: #fca5a5; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; }
    .btn-danger:active { background: #7f1d1d; }
    .btn-sm { background: #1a1714; color: #c9a84c; border: 1px solid #5a3a0a; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; }
    .btn-sm:active { background: #2a1f08; }
    .save-btn { background: linear-gradient(90deg,#c9a84c,#a8832a); color: #0d0b09; border: none; border-radius: 10px; padding: 9px 16px; font-size: 13px; font-weight: 900; font-family: inherit; cursor: pointer; white-space: nowrap; }
    .save-btn:active { opacity: 0.85; }
    .error { color: #f87171; font-size: 13px; font-weight: 700; margin-top: 8px; display: none; }
    .success { color: #4ade80; font-size: 13px; font-weight: 700; margin-top: 8px; display: none; }
    .section-title { font-size: 11px; font-weight: 900; color: #6b5c42; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
    .back-link { display: inline-block; background: #0d0b09; border: 1px solid #2e2720; border-radius: 10px; color: #8a7a60; font-size: 13px; font-weight: 700; padding: 8px 14px; text-decoration: none; }

    /* USER CARDS */
    .user-card { background: #0d0b09; border-radius: 14px; border: 1px solid #2e2720; margin-bottom: 10px; overflow: hidden; }
    .user-header { display: flex; align-items: center; gap: 12px; padding: 14px; }
    .avatar-circle {
      width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid #2e2720; background: #1a1714;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; overflow: hidden; cursor: pointer; transition: border-color 0.2s;
    }
    .avatar-circle:hover { border-color: #c9a84c; }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 15px; font-weight: 800; color: #f0ebe0; }
    .user-meta { font-size: 11px; color: #5a4a35; margin-top: 2px; }
    .admin-badge { background: #2a1f08; color: #c9a84c; border-radius: 6px; padding: 2px 8px; font-size: 10px; font-weight: 900; letter-spacing: 0.5px; margin-left: 6px; }
    .user-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* EDIT PANEL */
    .user-detail { border-top: 1px solid #1a1714; padding: 16px; display: none; flex-direction: column; gap: 16px; }
    .user-detail.open { display: flex; }
    .detail-label { font-size: 11px; font-weight: 800; color: #8a7a60; letter-spacing: 0.5px; margin-bottom: 8px; }
    .detail-row { display: flex; gap: 8px; align-items: center; }

    /* PHOTO UPLOAD */
    .photo-upload-area {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .photo-big {
      width: 90px; height: 90px; border-radius: 50%; border: 3px solid #2e2720;
      background: #1a1714; display: flex; align-items: center; justify-content: center;
      font-size: 38px; overflow: hidden; cursor: pointer; transition: border-color 0.2s;
      position: relative;
    }
    .photo-big:hover { border-color: #c9a84c; }
    .photo-big img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .photo-big .overlay {
      position: absolute; inset: 0; border-radius: 50%;
      background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s; font-size: 24px;
    }
    .photo-big:hover .overlay { opacity: 1; }
    .photo-hint { font-size: 12px; color: #5a4a35; font-weight: 700; }
    .photo-btns { display: flex; gap: 8px; }
    .upload-btn {
      background: #1a1714; border: 1px solid #5a3a0a; color: #c9a84c;
      border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 800;
      font-family: inherit; cursor: pointer;
    }
    .upload-btn:active { background: #2a1f08; }
    .remove-photo-btn {
      background: #1a1714; border: 1px solid #450a0a; color: #f87171;
      border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 800;
      font-family: inherit; cursor: pointer;
    }
    .remove-photo-btn:active { background: #450a0a; }

    /* PASSWORD */
    .detail-input { flex: 1; background: #141210; border: 1px solid #2e2720; border-radius: 10px; padding: 9px 12px; color: #f0ebe0; font-size: 14px; font-family: inherit; outline: none; }
    .detail-input:focus { border-color: #c9a84c; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #1a1714; border: 1px solid #2e2720; border-radius: 12px;
      padding: 10px 20px; font-size: 13px; font-weight: 700; color: #f0ebe0;
      z-index: 9999; white-space: nowrap; pointer-events: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateX(-50%) translateY(8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

    /* Hidden file input */
    #fileInput { display: none; }
    .spinner { display: none; font-size: 12px; color: #8a7a60; }
  </style>
</head>
<body>

<input type="file" id="fileInput" accept="image/*" />

<!-- PANEL -->
<div id="adminPanel" style="display:none">
  <div class="wrap">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;">
      <h1>⚙️ Administración</h1>
      <a href="index.html" class="back-link">← Volver</a>
    </div>
    <p class="subtitle">Gestión de usuarios — MEMENTO</p>

    <div class="card">
      <h2>Crear usuario</h2>
      <label>NOMBRE DE USUARIO</label>
      <input type="text" id="nu_user" placeholder="nombre..." autocapitalize="none" autocomplete="off" />
      <label>CONTRASEÑA</label>
      <input type="password" id="nu_pass" placeholder="••••••••" />
      <button class="btn" onclick="createUser()">+ Crear usuario</button>
      <p id="createErr" class="error"></p>
      <p id="createOk" class="success"></p>
    </div>

    <div class="section-title">Usuarios con acceso</div>
    <div id="usersList"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, update, remove }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
           updatePassword, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const FB_CONFIG = {
    apiKey:      'AIzaSyBnmTgJYFsFAFWnGyaDZRUxOZGnL5SE1QA',
    projectId:   'lista-compra-9d6f5',
    appId:       '1:241322134457:web:1b765857911f94d69cc468',
    authDomain:  'lista-compra-9d6f5.firebaseapp.com',
    databaseURL: 'https://lista-compra-9d6f5-default-rtdb.europe-west1.firebasedatabase.app'
  };

  const app  = initializeApp(FB_CONFIG, 'mementov2-admin');
  const db   = getDatabase(app);
  const auth = getAuth(app);

  const ADMIN_USER  = 'ruben';
  const ADMIN_EMAIL = 'ruben@milista.app';
  let _adminPass = '';
  let usuarios = {};
  let _currentPhotoUser = null; // usuario al que se está subiendo foto

  document.getElementById('a_pass').addEventListener('keydown', e => { if(e.key==='Enter') adminLogin(); });
  document.getElementById('a_pass').addEventListener('input',   e => { _adminPass = e.target.value; });

  // ── FILE INPUT ───────────────────────────────────────────
  document.getElementById('fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file || !_currentPhotoUser) return;
    e.target.value = ''; // reset para poder subir otra vez
    resizeAndSave(file, _currentPhotoUser);
  });

  // Redimensionar imagen y convertir a Base64
  function resizeAndSave(file, key) {
    const MAX = 200; // px — tamaño máximo del lado más largo
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
        else       { if (h > MAX) { w = w * MAX / h; h = MAX; } }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const b64 = canvas.toDataURL('image/jpeg', 0.82);
        saveAvatarB64(key, b64);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  async function saveAvatarB64(key, b64) {
    try {
      await update(ref(db, 'memento_usuarios/' + key), { avatar: b64 });
      // Actualizar preview en pantalla
      const bigEl = document.getElementById('photo-big-' + key);
      const circleEl = document.getElementById('circle-' + key);
      if (bigEl)    bigEl.innerHTML    = `<img src="${b64}" /><div class="overlay">📷</div>`;
      if (circleEl) circleEl.innerHTML = `<img src="${b64}" />`;
      showToast('✓ Foto actualizada');
    } catch(e) { showToast('❌ Error al guardar: ' + e.message); }
  }

  function pickPhoto(key) {
    _currentPhotoUser = key;
    document.getElementById('fileInput').click();
  }

  window.pickPhoto = pickPhoto;

  async function removePhoto(key) {
    if (!confirm('¿Eliminar la foto de ' + key + '?')) return;
    try {
      await update(ref(db, 'memento_usuarios/' + key), { avatar: null });
      const bigEl = document.getElementById('photo-big-' + key);
      const circleEl = document.getElementById('circle-' + key);
      if (bigEl)    bigEl.innerHTML    = '👤<div class="overlay">📷</div>';
      if (circleEl) circleEl.innerHTML = '👤';
      showToast('✓ Foto eliminada');
    } catch(e) { showToast('❌ Error: ' + e.message); }
  }
  window.removePhoto = removePhoto;

  // ── LOGIN ────────────────────────────────────────────────
  window.adminLogin = async function() {
    const pass = document.getElementById('a_pass').value.trim();
    const err  = document.getElementById('loginErr');
    err.style.display = 'none';
    if (!pass) return;
    try {
      await signInWithEmailAndPassword(auth, ADMIN_EMAIL, pass);
      if (auth.currentUser.email !== ADMIN_EMAIL) { await signOut(auth); err.style.display='block'; return; }
      document.getElementById('loginWrap').style.display  = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      initAdmin();
    } catch(e) { err.style.display = 'block'; }
  };

  function initAdmin() {
    onValue(ref(db, 'memento_usuarios'), snap => {
      usuarios = snap.val() || {};
      renderUsers();
    });
  }

  // ── RENDER ───────────────────────────────────────────────
  function renderUsers() {
    const c = document.getElementById('usersList');
    const keys = Object.keys(usuarios).sort((a,b) => {
      if (a === ADMIN_USER) return -1;
      if (b === ADMIN_USER) return 1;
      return a.localeCompare(b);
    });
    if (!keys.length) { c.innerHTML='<p style="color:#5a4a35;font-size:13px;padding:8px 0;">No hay usuarios aún.</p>'; return; }

    c.innerHTML = keys.map(key => {
      const u = usuarios[key] || {};
      const isAdmin = key === ADMIN_USER;
      const fecha = u.createdAt ? new Date(u.createdAt).toLocaleDateString('es-ES') : '';
      const avatarHtml = u.avatar
        ? `<img src="${u.avatar}" />`
        : '👤';

      return `
      <div class="user-card">
        <div class="user-header">
          <div class="avatar-circle" id="circle-${key}" onclick="pickPhoto('${key}')" title="Cambiar foto">
            ${avatarHtml}
          </div>
          <div class="user-info">
            <div class="user-name">
              ${key.charAt(0).toUpperCase() + key.slice(1)}
              ${isAdmin ? '<span class="admin-badge">ADMIN</span>' : ''}
            </div>
            ${fecha ? `<div class="user-meta">Alta: ${fecha}</div>` : ''}
          </div>
          <div class="user-actions">
            <button class="btn-sm" onclick="toggleDetail('${key}')">✏️ Editar</button>
            ${!isAdmin ? `<button class="btn-danger" onclick="deleteUser('${key}')">🗑</button>` : ''}
          </div>
        </div>
        <div class="user-detail" id="detail-${key}">

          <!-- FOTO -->
          <div>
            <div class="detail-label">📷 FOTO DE PERFIL</div>
            <div class="photo-upload-area">
              <div class="photo-big" id="photo-big-${key}" onclick="pickPhoto('${key}')" title="Pulsa para cambiar">
                ${u.avatar ? `<img src="${u.avatar}" />` : '👤'}
                <div class="overlay">📷</div>
              </div>
              <span class="photo-hint">Pulsa la foto para seleccionar desde el dispositivo</span>
              <div class="photo-btns">
                <button class="upload-btn" onclick="pickPhoto('${key}')">📁 Seleccionar imagen</button>
                ${u.avatar ? `<button class="remove-photo-btn" onclick="removePhoto('${key}')">🗑 Quitar foto</button>` : ''}
              </div>
            </div>
          </div>

          <!-- CONTRASEÑA -->
          <div>
            <div class="detail-label">🔑 CAMBIAR CONTRASEÑA</div>
            <div class="detail-row">
              <input class="detail-input" id="pass-${key}" type="password" placeholder="Nueva contraseña..." />
              <button class="save-btn" onclick="savePass('${key}')">✓ Guardar</button>
            </div>
            <div id="pass-hint-${key}" style="font-size:11px; color:#5a4a35; margin-top:6px;">
              Se pedirá la contraseña actual de ${key} para confirmar.
            </div>
          </div>

        </div>
      </div>`;
    }).join('');
  }

  window.toggleDetail = function(key) {
    const d = document.getElementById('detail-' + key);
    d.classList.toggle('open');
  };

  // ── CAMBIAR CONTRASEÑA ───────────────────────────────────
  window.savePass = async function(key) {
    const newPass = document.getElementById('pass-' + key).value.trim();
    if (!newPass) { showToast('❌ Escribe una contraseña'); return; }
    if (newPass.length < 6) { showToast('❌ Mínimo 6 caracteres'); return; }
    const currentPass = prompt('Contraseña ACTUAL de ' + key + ':');
    if (!currentPass) return;
    const savedAdminPass = _adminPass;
    try {
      const cred = await signInWithEmailAndPassword(auth, key + '@milista.app', currentPass);
      await updatePassword(cred.user, newPass);
      await signInWithEmailAndPassword(auth, ADMIN_EMAIL, savedAdminPass);
      document.getElementById('pass-' + key).value = '';
      showToast('✓ Contraseña de ' + key + ' actualizada');
    } catch(e) {
      try { await signInWithEmailAndPassword(auth, ADMIN_EMAIL, savedAdminPass); } catch {}
      showToast('❌ ' + (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential'
        ? 'Contraseña actual incorrecta' : e.message));
    }
  };

  // ── CREAR USUARIO ────────────────────────────────────────
  window.createUser = async function() {
    const user = document.getElementById('nu_user').value.trim().toLowerCase();
    const pass = document.getElementById('nu_pass').value.trim();
    const err  = document.getElementById('createErr');
    const ok   = document.getElementById('createOk');
    err.style.display = 'none'; ok.style.display = 'none';
    if (!user || !pass) { err.textContent='Rellena nombre y contraseña'; err.style.display='block'; return; }
    if (pass.length < 6) { err.textContent='Mínimo 6 caracteres'; err.style.display='block'; return; }
    if (usuarios[user]) { err.textContent='Ese usuario ya existe en MEMENTO'; err.style.display='block'; return; }
    try {
      let uid;
      try {
        const cred = await createUserWithEmailAndPassword(auth, user + '@milista.app', pass);
        uid = cred.user.uid;
        await signInWithEmailAndPassword(auth, ADMIN_EMAIL, _adminPass);
      } catch(authErr) {
        if (authErr.code === 'auth/email-already-in-use') { uid = 'existing'; }
        else { throw authErr; }
      }
      await set(ref(db, 'memento_usuarios/' + user), { uid, createdAt: Date.now() });
      document.getElementById('nu_user').value = '';
      document.getElementById('nu_pass').value = '';
      ok.textContent = '✓ Usuario "' + user + '" creado';
      ok.style.display = 'block';
      setTimeout(() => { ok.style.display='none'; }, 3000);
    } catch(e) {
      err.textContent = 'Error: ' + e.message;
      err.style.display = 'block';
    }
  };

  // ── ELIMINAR USUARIO ─────────────────────────────────────
  window.deleteUser = async function(key) {
    if (!confirm('¿Eliminar a "' + key + '" de MEMENTO?')) return;
    try {
      await remove(ref(db, 'memento_usuarios/' + key));
      showToast('✓ Usuario eliminado');
    } catch(e) { showToast('❌ Error: ' + e.message); }
  };

  // ── TOAST ────────────────────────────────────────────────
  function showToast(msg) {
    const e = document.getElementById('_toast'); if(e) e.remove();
    const t = document.createElement('div');
    t.id='_toast'; t.className='toast'; t.textContent=msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(), 2800);
  }
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/mi-lista/mis-recordatorios/sw.js')
        .then(reg => {
          reg.update();
          reg.addEventListener('updatefound', () => {
            const w = reg.installing;
            w.addEventListener('statechange', () => {
              if (w.state === 'activated') window.location.reload();
            });
          });
        }).catch(() => {});
      navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
    });
  }
</script>
</body>
</html>
