<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#ffffff"/>
<meta name="color-scheme" content="light only"/>
<meta name="supported-color-schemes" content="light"/>
<title>Calendario — MEMENTO</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{color-scheme:light only}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;color-scheme:light}
html,body{background:#f7f5f2!important;color:#1a1714!important;font-family:'Nunito',sans-serif;min-height:100vh;overscroll-behavior:none}
input,textarea,select,button{font-family:inherit;color-scheme:light}
input[type=date],input[type=time],textarea,select{background:#f7f5f2!important;color:#1a1714!important;-webkit-text-fill-color:#1a1714!important}

/* HEADER */
.hdr{background:#fff;border-bottom:.5px solid #f0ede8;padding:10px 14px 8px;position:sticky;top:0;z-index:50}
.hdr-r1{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.hdr-r2{display:flex;align-items:center;gap:8px}
.back-btn{width:34px;height:34px;background:#f7f5f2;border:.5px solid #e0ddd6;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-appearance:none;color:#888}
.back-btn:active{background:#eeeae4}
.view-toggle{display:flex;background:#f0ede8;border-radius:9px;padding:3px;gap:2px;margin-left:auto}
.vbtn{background:transparent;border:none;border-radius:7px;padding:5px 11px;font-size:12px;font-weight:800;color:#999;cursor:pointer;-webkit-appearance:none;transition:all .15s}
.vbtn.on{background:#fff;color:#1a1714;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.nav-btn{width:34px;height:34px;background:#f7f5f2;border:.5px solid #e0ddd6;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-appearance:none;color:#888}
.nav-btn:active{background:#eeeae4}
.period-lbl{font-size:15px;font-weight:900;color:#1a1714;flex:1;text-align:center}

/* CALENDAR GRID */
.cal-wrap{padding:8px 8px 100px}
.wdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px}
.wday{text-align:center;font-size:10px;font-weight:800;color:#bbb;padding:3px 0;letter-spacing:.3px}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.day{min-height:68px;background:#fff;border-radius:8px;border:.5px solid #eeeae4;padding:4px 3px;cursor:pointer;overflow:hidden;display:flex;flex-direction:column}
.day:active{background:#fdf8ef}
.day.empty{background:transparent;border-color:transparent;cursor:default}
.day.today .dnw{background:#c9a84c;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.day.today .dn{color:#fff;font-weight:900}
.dnw{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;margin-bottom:2px}
.dn{font-size:12px;font-weight:700;color:#1a1714;line-height:1}
.dev-list{display:flex;flex-direction:column;gap:1px;flex:1;overflow:hidden}
.dev{font-size:9.5px;font-weight:700;border-radius:3px;padding:1px 3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.5}
.dev.cal{background:#fdf6e8;color:#a8832a}
.dev.loc{background:#f0f0f0;color:#666}
.dev.all{background:#e8f4fd;color:#1a73e8}
.more{font-size:9px;font-weight:700;color:#c9a84c;padding-left:3px}

/* WEEK VIEW */
.week-wrap{padding:0 8px 100px;overflow-y:auto;max-height:calc(100vh - 130px)}
.wk-day{margin-bottom:5px}
.wk-hdr{display:flex;align-items:center;gap:9px;padding:10px 12px 7px}
.wk-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#1a1714;flex-shrink:0}
.wk-num.today{background:#c9a84c;color:#fff}
.wk-name{font-size:14px;font-weight:900;color:#1a1714}
.wk-name span{font-size:12px;font-weight:700;color:#bbb;margin-left:4px}
.wk-events{padding:0 12px 7px;display:flex;flex-direction:column;gap:5px}
.wk-event{background:#fff;border-radius:11px;border:.5px solid #eeeae4;padding:10px 12px;display:flex;align-items:flex-start;gap:9px}
.wk-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.wk-dot.cal{background:#c9a84c}
.wk-dot.loc{background:#bbb}
.wk-dot.all{background:#1a73e8}
.wk-ename{font-size:13px;font-weight:700;color:#1a1714;display:flex;align-items:center;gap:3px}
.wk-etime{font-size:11px;color:#999;margin-top:2px}
.wk-divider{height:.5px;background:#f0ede8;margin:0 12px}

/* DAY POPUP */
.overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.3);align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;padding:16px 16px calc(16px + env(safe-area-inset-bottom,0px));border-top:.5px solid #eee;box-shadow:0 -4px 20px rgba(0,0,0,.1)}
.handle{width:34px;height:4px;background:#e8e4dc;border-radius:2px;margin:0 auto 14px}
.day-popup-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.day-popup-title{font-size:15px;font-weight:900;color:#1a1714}
.plus-btn{width:30px;height:30px;background:#c9a84c;border:none;border-radius:50%;color:#fff;font-size:19px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.day-events-list{max-height:48vh;overflow-y:auto;margin-bottom:10px}
.ev-item{background:#f9f8f6;border-radius:11px;border:.5px solid #eeeae4;padding:10px 12px;margin-bottom:7px;display:flex;align-items:flex-start;gap:9px}
.ev-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ev-dot.cal{background:#c9a84c}
.ev-dot.loc{background:#bbb}
.ev-dot.all{background:#1a73e8}
.ev-name{font-size:13px;font-weight:700;color:#1a1714;display:flex;align-items:center;gap:3px}
.ev-time{font-size:11px;color:#999;margin-top:2px}
.ev-actions{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.ev-btn{background:#f7f5f2;border:.5px solid #e0ddd6;border-radius:7px;padding:6px 10px;font-size:11px;font-weight:800;color:#777;cursor:pointer;-webkit-appearance:none}
.ev-btn.gold{color:#a8832a;border-color:#e8d090;background:#fdf6e8}
.ev-btn.red{background:#fff0f0;border:none;color:#e05050}
.ev-edit-row{display:none;margin-top:8px;gap:6px;align-items:flex-start}
.ev-edit-row.open{display:flex}
.ev-ta{flex:1;min-width:0;background:#fdf8ef;border:1px solid #c9a84c;border-radius:8px;padding:7px 10px;font-size:13px;outline:none;resize:none;min-height:34px;color:#1a1714;-webkit-text-fill-color:#1a1714!important}
.ev-ok{background:#c9a84c;color:#fff;border:none;border-radius:8px;padding:7px 10px;font-weight:900;cursor:pointer;font-size:12px}
.ev-x{background:#f5f2ee;border:.5px solid #e0ddd6;color:#aaa;border-radius:8px;padding:7px 8px;font-weight:700;cursor:pointer;font-size:12px}
.close-btn{width:100%;background:#f5f2ee;border:.5px solid #e0ddd6;border-radius:11px;padding:11px;font-size:13px;font-weight:700;color:#888;cursor:pointer;-webkit-appearance:none}
.no-ev{color:#bbb;font-size:13px;text-align:center;padding:16px 0}

/* ADD / RESCHEDULE POPUP */
.sheet-title{font-size:16px;font-weight:900;color:#1a1714;margin-bottom:12px}
.input-row{display:flex;gap:7px;align-items:center;margin-bottom:9px}
.add-input{flex:1;min-width:0;height:44px;background:#f7f5f2;border:.5px solid #e8e4dc;border-radius:10px;padding:0 12px;font-size:14px;outline:none;color:#1a1714;-webkit-text-fill-color:#1a1714!important}
.add-input::placeholder{color:#ccc}
.add-input:focus{border-color:#c9a84c}
.mic-btn{width:44px;height:44px;background:#f7f5f2;border:.5px solid #e8e4dc;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-appearance:none;color:#aaa}
.mic-btn:active{background:#eeeae4}
.dt-in{width:100%;background:#f7f5f2;border:.5px solid #e0ddd6;border-radius:10px;padding:11px 12px;font-size:14px;outline:none;margin-bottom:9px;-webkit-appearance:none;color-scheme:light;color:#1a1714;-webkit-text-fill-color:#1a1714!important}
.dt-in:focus{border-color:#c9a84c}
.checks-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.chk-label{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.chk-box{width:20px;height:20px;border-radius:5px;border:1.5px solid #ddd;background:transparent;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;cursor:pointer;flex-shrink:0;transition:all .15s}
.chk-box.on{background:#c9a84c;border-color:#c9a84c}
.chk-text{font-size:12px;font-weight:700;color:#666}
.btn-col{display:flex;flex-direction:column;gap:7px}
.btn-row{display:flex;gap:7px}
.save-btn{flex:1;background:#c9a84c;color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:900;cursor:pointer;-webkit-appearance:none}
.cancel-btn{background:#f5f2ee;border:.5px solid #e0ddd6;color:#888;border-radius:10px;padding:12px 14px;font-size:14px;font-weight:700;cursor:pointer;-webkit-appearance:none}
.gcal-btn{width:100%;background:#f0f7ff;border:.5px solid #90c0f0;color:#1a73e8;border-radius:10px;padding:12px 14px;font-size:13px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-appearance:none}
.gcal-btn:active{background:#e0eeff}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1714;color:#f0ebe0;border-radius:12px;padding:10px 16px;font-size:12px;font-weight:700;z-index:9999;white-space:nowrap;pointer-events:none;animation:su .25s ease;box-shadow:0 5px 20px rgba(0,0,0,.25)}
@keyframes su{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

@media(prefers-color-scheme:dark){
  html,body{background:#f7f5f2!important;color:#1a1714!important}
  .hdr,.day,.wk-event,.ev-item,.sheet{background:#ffffff!important}
  .dn,.wk-name,.ev-name,.period-lbl,.day-popup-title{color:#1a1714!important}
  .add-input,.dt-in{background:#f7f5f2!important;color:#1a1714!important;-webkit-text-fill-color:#1a1714!important}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-r1">
    <button class="back-btn" onclick="location.href='index.html'">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 13 15 13 15 21"/></svg>
    </button>
    <div style="flex:1;text-align:center;font-size:14px;font-weight:900;color:#1a1714;letter-spacing:.5px">MEMENTO</div>
    <div class="view-toggle">
      <button class="vbtn on" id="vbtnM" onclick="setView('month')">Mes</button>
      <button class="vbtn" id="vbtnW" onclick="setView('week')">Semana</button>
    </div>
  </div>
  <div class="hdr-r2">
    <button class="nav-btn" onclick="changePeriod(-1)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="period-lbl" id="periodLbl">—</div>
    <button class="nav-btn" onclick="changePeriod(1)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<div class="cal-wrap" id="calWrap">
  <div class="wdays" id="wdaysHdr">
    <div class="wday">LUN</div><div class="wday">MAR</div><div class="wday">MIÉ</div>
    <div class="wday">JUE</div><div class="wday">VIE</div><div class="wday">SÁB</div><div class="wday">DOM</div>
  </div>
  <div class="days" id="monthGrid"></div>
</div>
<div class="week-wrap" id="weekWrap" style="display:none"></div>

<!-- DAY POPUP -->
<div class="overlay" id="dayOverlay">
  <div class="sheet">
    <div class="handle"></div>
    <div class="day-popup-hdr">
      <div class="day-popup-title" id="dayTitle"></div>
      <button class="plus-btn" onclick="openAddEvent()">+</button>
    </div>
    <div class="day-events-list" id="dayEvList"></div>
    <button class="close-btn" onclick="closeDayPopup()">Cerrar</button>
  </div>
</div>

<!-- ADD EVENT POPUP -->
<div class="overlay" id="addOverlay">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title" id="addTitle">Nuevo recordatorio</div>
    <div class="input-row">
      <input class="add-input" id="addInput" placeholder="Recordatorio..." autocapitalize="sentences"/>
      <button class="mic-btn" id="addMicBtn" onclick="toggleAddMic()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="9" y1="22" x2="15" y2="22"/></svg>
      </button>
    </div>
    <input type="time" class="dt-in" id="addTime" value="09:00"
      onclick="this.showPicker&&this.showPicker()" onfocus="this.showPicker&&this.showPicker()"/>
    <div class="checks-row">
      <div class="chk-label" onclick="toggleAddAllDay()">
        <div class="chk-box" id="addAllDayChk"></div>
        <span class="chk-text">Todo el día</span>
      </div>
      <div class="chk-label" onclick="toggleAddCalSync()">
        <span class="chk-text">Sincronizar con Calendar</span>
        <div class="chk-box" id="addCalChk"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="cancel-btn" onclick="closeAddEvent()">Cancelar</button>
      <button class="save-btn" onclick="saveAddEvent()">+ Añadir</button>
    </div>
  </div>
</div>

<!-- RESCHEDULE POPUP -->
<div class="overlay" id="reschedOverlay">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title" id="reschedTitle">Reprogramar</div>
    <input type="date" class="dt-in" id="reschedDate"
      onclick="this.showPicker&&this.showPicker()" onfocus="this.showPicker&&this.showPicker()"/>
    <input type="time" class="dt-in" id="reschedTime" value="09:00"
      onclick="this.showPicker&&this.showPicker()" onfocus="this.showPicker&&this.showPicker()"/>
    <div class="checks-row">
      <div class="chk-label" onclick="toggleReschedAllDay()">
        <div class="chk-box" id="reschedAllDayChk"></div>
        <span class="chk-text">Todo el día</span>
      </div>
      <div class="chk-label" onclick="toggleReschedCalSync()">
        <span class="chk-text">Sincronizar con Calendar</span>
        <div class="chk-box" id="reschedCalChk"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="cancel-btn" onclick="closeResched()">Cancelar</button>
      <button class="save-btn" onclick="saveResched()">✓ Guardar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const FB = { apiKey:'AIzaSyBnmTgJYFsFAFWnGyaDZRUxOZGnL5SE1QA', projectId:'lista-compra-9d6f5', appId:'1:241322134457:web:1b765857911f94d69cc468', authDomain:'lista-compra-9d6f5.firebaseapp.com', databaseURL:'https://lista-compra-9d6f5-default-rtdb.europe-west1.firebasedatabase.app' };
const app  = initializeApp(FB, 'mv2cal');
const db   = getDatabase(app);
const auth = getAuth(app);

// ── STATE ─────────────────────────────────────────────────
let items = {}, itemsRef, listaPath, session;
let viewMode = 'month';
let curYear, curMonth, curWeekStart;
let currentDayDate = null;
let addAllDay = false, addCalSync = false;
let reschedId = null, reschedAllDay = false, reschedCalSync = false;
let addMicActive = false, addMicRec = null;

const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS_L = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const DAYS_S = ['LUN','MAR','MIÉ','JUE','VIE','SÁB','DOM'];
const CAL_SVG = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#a8832a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><rect x="3" y="4" width="18" height="17" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';

// ── HELPERS ───────────────────────────────────────────────
function getSession()  { try { return JSON.parse(localStorage.getItem('mv2s')||'null'); } catch { return null; } }
function getGcalToken(){ try { const d=JSON.parse(localStorage.getItem('mv2gt')||'null'); return (d&&d.exp>Date.now())?d.t:null; } catch { return null; } }
function getCalId()    { try { return JSON.parse(localStorage.getItem('mv2sc')||'null')?.id||'primary'; } catch { return 'primary'; } }
function iref(id)      { return ref(db, listaPath+'/'+id); }
function pad(n)        { return String(n).padStart(2,'0'); }
function toast(msg) {
  const e=document.getElementById('_t'); if(e)e.remove();
  const t=document.createElement('div');t.id='_t';t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2800);
}
function fmtTime(ts,allDay) {
  if (allDay) return 'Todo el día';
  return new Date(ts).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}
function getMonday(d) {
  const dt=new Date(d), day=dt.getDay(), diff=day===0?-6:1-day;
  dt.setDate(dt.getDate()+diff); dt.setHours(0,0,0,0); return dt;
}
function getItemsForDay(y,m,d) {
  return Object.values(items).filter(item=>{
    if (!item.alarmTs||item.checked) return false;
    const dt=new Date(item.alarmTs);
    return dt.getFullYear()===y&&dt.getMonth()===m&&dt.getDate()===d;
  }).sort((a,b)=>(a.alarmTs||0)-(b.alarmTs||0));
}
function getItemsForDate(d) { return getItemsForDay(d.getFullYear(),d.getMonth(),d.getDate()); }

// ── GCAL API ──────────────────────────────────────────────
async function gcalCreate(name, ts, allDay) {
  const token=getGcalToken(); const calId=getCalId(); if(!token)return null;
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  let ev;
  if (allDay) {
    const ds=new Date(ts).toISOString().slice(0,10), de=new Date(ts+86400000).toISOString().slice(0,10);
    ev={summary:'🔔 '+name,start:{date:ds},end:{date:de},reminders:{useDefault:false,overrides:[{method:'popup',minutes:0}]}};
  } else {
    ev={summary:'🔔 '+name,start:{dateTime:new Date(ts).toISOString(),timeZone:tz},end:{dateTime:new Date(ts+1800000).toISOString(),timeZone:tz},reminders:{useDefault:false,overrides:[{method:'popup',minutes:0}]}};
  }
  try {
    const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(calId)+'/events',
      {method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(ev)});
    return r.ok ? (await r.json()).id : null;
  } catch { return null; }
}
async function gcalUpdate(gcalId, name, ts, allDay) {
  const token=getGcalToken(); const calId=getCalId(); if(!token||!gcalId)return;
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  let ev;
  if (allDay) {
    const ds=new Date(ts).toISOString().slice(0,10), de=new Date(ts+86400000).toISOString().slice(0,10);
    ev={summary:'🔔 '+name,start:{date:ds},end:{date:de}};
  } else {
    ev={summary:'🔔 '+name,start:{dateTime:new Date(ts).toISOString(),timeZone:tz},end:{dateTime:new Date(ts+1800000).toISOString(),timeZone:tz}};
  }
  fetch('https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(calId)+'/events/'+gcalId,
    {method:'PUT',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(ev)}).catch(()=>{});
}
function gcalDelete(gcalId) {
  const token=getGcalToken(); const calId=getCalId(); if(!token||!gcalId)return;
  fetch('https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(calId)+'/events/'+gcalId,
    {method:'DELETE',headers:{'Authorization':'Bearer '+token}}).catch(()=>{});
}

// ── LOGIN ─────────────────────────────────────────────────
const s = getSession();
if (!s) { location.href='index.html'; }
else { session=s; const now=new Date(); curYear=now.getFullYear(); curMonth=now.getMonth(); curWeekStart=getMonday(now); initApp(); }

async function initApp() {
  try { if (!auth.currentUser) await signInWithEmailAndPassword(auth,session.user+'@milista.app',session.pass); }
  catch { location.href='index.html'; return; }
  listaPath='memento/'+session.user+'/recordatorios';
  itemsRef=ref(db,listaPath);
  onValue(itemsRef, snap=>{
    const raw=snap.val()||{}; items={};
    Object.entries(raw).forEach(([id,item])=>{ items[id]={...item,_id:id}; });
    render();
    if (currentDayDate&&document.getElementById('dayOverlay').classList.contains('open')) {
      // Only refresh if no edit row is currently open
      const editOpen = document.querySelector('.ev-edit-row.open');
      if (!editOpen) setTimeout(refreshDayPopup, 100);
    }
  });
}

// ── VIEW ──────────────────────────────────────────────────
window.setView = function(v) {
  viewMode=v;
  document.getElementById('vbtnM').classList.toggle('on',v==='month');
  document.getElementById('vbtnW').classList.toggle('on',v==='week');
  render();
};
window.changePeriod = function(d) {
  if (viewMode==='month') {
    curMonth+=d;
    if(curMonth>11){curMonth=0;curYear++;} else if(curMonth<0){curMonth=11;curYear--;}
  } else {
    curWeekStart=new Date(curWeekStart.getTime()+d*7*86400000);
  }
  render();
};
function render() { viewMode==='month'?renderMonth():renderWeek(); }

// ── MONTH VIEW ────────────────────────────────────────────
function renderMonth() {
  document.getElementById('periodLbl').textContent=MONTHS[curMonth]+' '+curYear;
  document.getElementById('calWrap').style.display='block';
  document.getElementById('weekWrap').style.display='none';
  document.getElementById('wdaysHdr').style.display='grid';

  const first=new Date(curYear,curMonth,1), last=new Date(curYear,curMonth+1,0), today=new Date();
  let dow=first.getDay(); dow=dow===0?6:dow-1;
  const cellH=Math.floor((window.innerHeight-160)/6);
  const maxEv=Math.max(1,Math.floor((cellH-28)/16));
  const grid=document.getElementById('monthGrid'); grid.innerHTML='';

  for(let i=0;i<dow;i++){const c=document.createElement('div');c.className='day empty';grid.appendChild(c);}
  for(let d=1;d<=last.getDate();d++){
    const isToday=today.getFullYear()===curYear&&today.getMonth()===curMonth&&today.getDate()===d;
    const dayItems=getItemsForDay(curYear,curMonth,d);
    const cell=document.createElement('div'); cell.className='day'+(isToday?' today':'');
    cell.onclick=()=>openDayPopup(new Date(curYear,curMonth,d));

    const nw=document.createElement('div'); nw.className='dnw';
    const num=document.createElement('div'); num.className='dn'; num.textContent=d;
    nw.appendChild(num); cell.appendChild(nw);

    const evList=document.createElement('div'); evList.className='dev-list';
    dayItems.slice(0,maxEv).forEach(item=>{
      const ev=document.createElement('div');
      const cls=item.allDay?'all':(item.gcalEventId?'cal':'loc');
      ev.className='dev '+cls;
      if(item.gcalEventId) {
        ev.innerHTML=CAL_SVG; ev.appendChild(document.createTextNode(item.name));
      } else { ev.textContent=item.name; }
      evList.appendChild(ev);
    });
    if(dayItems.length>maxEv){const m=document.createElement('div');m.className='more';m.textContent='+'+(dayItems.length-maxEv)+' más';evList.appendChild(m);}
    cell.appendChild(evList); grid.appendChild(cell);
  }
}

// ── WEEK VIEW ─────────────────────────────────────────────
function renderWeek() {
  document.getElementById('calWrap').style.display='none';
  document.getElementById('weekWrap').style.display='block';
  const today=new Date();
  const days=Array.from({length:7},(_,i)=>{const d=new Date(curWeekStart);d.setDate(d.getDate()+i);return d;});
  const first=days[0],last=days[6];
  const sm=first.getMonth()===last.getMonth();
  document.getElementById('periodLbl').textContent=sm
    ?first.getDate()+' – '+last.getDate()+' '+MONTHS[last.getMonth()]+' '+last.getFullYear()
    :first.getDate()+' '+MONTHS[first.getMonth()].slice(0,3)+' – '+last.getDate()+' '+MONTHS[last.getMonth()].slice(0,3)+' '+last.getFullYear();

  const wrap=document.getElementById('weekWrap'); wrap.innerHTML='';
  days.forEach((d,i)=>{
    const isToday=d.toDateString()===today.toDateString();
    const dayItems=getItemsForDate(d);
    const dow=(d.getDay()+6)%7;

    const block=document.createElement('div'); block.className='wk-day';
    const hdr=document.createElement('div'); hdr.className='wk-hdr';
    const num=document.createElement('div'); num.className='wk-num'+(isToday?' today':''); num.textContent=d.getDate();
    const name=document.createElement('div'); name.className='wk-name';
    name.innerHTML=DAYS_L[dow]+'<span>'+MONTHS[d.getMonth()]+'</span>';
    hdr.appendChild(num); hdr.appendChild(name);
    hdr.onclick=()=>openDayPopup(d);
    block.appendChild(hdr);

    if(dayItems.length>0){
      const evWrap=document.createElement('div'); evWrap.className='wk-events';
      dayItems.forEach(item=>{
        const cls=item.allDay?'all':(item.gcalEventId?'cal':'loc');
        const ev=document.createElement('div'); ev.className='wk-event';
        const dot=document.createElement('div'); dot.className='wk-dot '+cls;
        const info=document.createElement('div');
        const en=document.createElement('div'); en.className='wk-ename';
        if(item.gcalEventId){en.innerHTML=CAL_SVG;en.appendChild(document.createTextNode(item.name));}
        else en.textContent=item.name;
        const et=document.createElement('div'); et.className='wk-etime'; et.textContent=fmtTime(item.alarmTs,item.allDay);
        info.appendChild(en); info.appendChild(et);
        ev.appendChild(dot); ev.appendChild(info);
        ev.onclick=()=>openDayPopup(d);
        evWrap.appendChild(ev);
      });
      block.appendChild(evWrap);
    }
    if(i<6){const div=document.createElement('div');div.className='wk-divider';block.appendChild(div);}
    wrap.appendChild(block);
  });
}

// ── DAY POPUP ─────────────────────────────────────────────
function openDayPopup(dateObj) {
  currentDayDate=dateObj;
  const wd=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  document.getElementById('dayTitle').textContent=wd[dateObj.getDay()]+', '+dateObj.getDate()+' de '+MONTHS[dateObj.getMonth()];
  refreshDayPopup();
  document.getElementById('dayOverlay').classList.add('open');
}
window.closeDayPopup=()=>document.getElementById('dayOverlay').classList.remove('open');

function refreshDayPopup() {
  if(!currentDayDate)return;
  const dayItems=getItemsForDate(currentDayDate);
  const list=document.getElementById('dayEvList'); list.innerHTML='';
  if(!dayItems.length){list.innerHTML='<div class="no-ev">Sin recordatorios este día</div>';return;}
  dayItems.forEach(item=>{
    const id=item._id;
    const cls=item.allDay?'all':(item.gcalEventId?'cal':'loc');

    const wrap=document.createElement('div'); wrap.className='ev-item'; wrap.id='evi-'+id;
    const dot=document.createElement('div'); dot.className='ev-dot '+cls;
    const cont=document.createElement('div'); cont.style.cssText='flex:1;min-width:0';

    const name=document.createElement('div'); name.className='ev-name';
    if(item.gcalEventId){name.innerHTML=CAL_SVG;name.appendChild(document.createTextNode(item.name));}
    else name.textContent=item.name;

    const time=document.createElement('div'); time.className='ev-time'; time.textContent=fmtTime(item.alarmTs,item.allDay);

    const acts=document.createElement('div'); acts.className='ev-actions';
    const editBtn=document.createElement('button'); editBtn.className='ev-btn'; editBtn.textContent='✏️ Editar'; editBtn.onclick=()=>toggleEvEdit(id);
    const rescBtn=document.createElement('button'); rescBtn.className='ev-btn gold'; rescBtn.textContent='📅 Reprogramar'; rescBtn.onclick=()=>openResched(id);
    const delBtn=document.createElement('button'); delBtn.className='ev-btn red'; delBtn.textContent='🗑 Eliminar'; delBtn.onclick=()=>deleteEv(id);
    acts.appendChild(editBtn); acts.appendChild(rescBtn); acts.appendChild(delBtn);

    const editRow=document.createElement('div'); editRow.className='ev-edit-row'; editRow.id='evr-'+id;
    const ta=document.createElement('textarea'); ta.className='ev-ta'; ta.id='evta-'+id; ta.rows=1; ta.value=item.name;
    ta.addEventListener('keydown',e=>{if(e.key==='Escape')toggleEvEdit(id);});
    ta.addEventListener('input',function(){this.style.height='auto';this.style.height=this.scrollHeight+'px';});
    const okBtn=document.createElement('button'); okBtn.className='ev-ok'; okBtn.textContent='✓'; okBtn.onclick=()=>saveEvEdit(id);
    const xBtn=document.createElement('button'); xBtn.className='ev-x'; xBtn.textContent='✕'; xBtn.onclick=()=>toggleEvEdit(id);
    editRow.appendChild(ta); editRow.appendChild(okBtn); editRow.appendChild(xBtn);

    cont.appendChild(name); cont.appendChild(time); cont.appendChild(acts); cont.appendChild(editRow);
    wrap.appendChild(dot); wrap.appendChild(cont);
    list.appendChild(wrap);
  });
}

window.toggleEvEdit = function(id) {
  const row=document.getElementById('evr-'+id);
  const ta=document.getElementById('evta-'+id);
  const open=row.classList.contains('open');
  document.querySelectorAll('.ev-edit-row.open').forEach(r=>r.classList.remove('open'));
  if(!open){row.classList.add('open');if(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';setTimeout(()=>{ta.focus();ta.select();},10);}}
};
window.saveEvEdit = async function(id) {
  const ta=document.getElementById('evta-'+id); if(!ta)return;
  const name=ta.value.trim(); if(!name)return;
  // Close edit row immediately
  const row=document.getElementById('evr-'+id);
  if(row) row.classList.remove('open');
  // Update local cache NOW so onValue refresh shows correct value
  if(items[id]) items[id].name=name;
  // Update name in visible DOM immediately
  const evItem=document.getElementById('evi-'+id);
  if(evItem){
    const nameEl=evItem.querySelector('.ev-name');
    if(nameEl){
      const svg=nameEl.querySelector('svg');
      nameEl.textContent=name;
      if(svg) nameEl.prepend(svg);
    }
  }
  const item=items[id]||{};
  if(item.gcalEventId&&getGcalToken()&&item.alarmTs) gcalUpdate(item.gcalEventId,name,item.alarmTs,item.allDay);
  await update(iref(id),{name});
  toast('✓ Actualizado');
};
window.deleteEv = async function(id) {
  if(!confirm('¿Eliminar este recordatorio?'))return;
  const item=items[id]||{};
  if(item.gcalEventId&&getGcalToken()) gcalDelete(item.gcalEventId);
  await remove(iref(id));
};

// ── ADD EVENT ─────────────────────────────────────────────
window.openAddEvent = function() {
  if(!currentDayDate)return;
  const d=currentDayDate, wd=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  document.getElementById('addTitle').textContent=wd[d.getDay()]+' '+d.getDate()+' '+MONTHS[d.getMonth()];
  document.getElementById('addInput').value='';
  document.getElementById('addTime').value='09:00';
  document.getElementById('addTime').style.display='block';
  addAllDay=false; addCalSync=!!getGcalToken();
  const adc=document.getElementById('addAllDayChk'); adc.className='chk-box'; adc.textContent='';
  const cac=document.getElementById('addCalChk');
  if(addCalSync){cac.className='chk-box on';cac.textContent='✓';}
  else{cac.className='chk-box';cac.textContent='';}
  document.getElementById('addOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('addInput').focus(),100);
};
window.closeAddEvent=()=>{
  if(addMicActive&&addMicRec)addMicRec.stop();
  document.getElementById('addOverlay').classList.remove('open');
};
window.toggleAddAllDay=function(){
  addAllDay=!addAllDay;
  const chk=document.getElementById('addAllDayChk'),ti=document.getElementById('addTime');
  if(addAllDay){chk.className='chk-box on';chk.textContent='✓';ti.style.display='none';}
  else{chk.className='chk-box';chk.textContent='';ti.style.display='block';}
};
window.toggleAddCalSync=function(){
  addCalSync=!addCalSync;
  const chk=document.getElementById('addCalChk');
  if(addCalSync){chk.className='chk-box on';chk.textContent='✓';}
  else{chk.className='chk-box';chk.textContent='';}
};
window.saveAddEvent=async function(){
  const name=document.getElementById('addInput').value.trim();
  if(!name){document.getElementById('addInput').focus();return;}
  const d=currentDayDate;
  let ts;
  if(addAllDay){ts=new Date(d.getFullYear(),d.getMonth(),d.getDate(),0,0,0).getTime();}
  else{const tv=document.getElementById('addTime').value||'09:00';const[h,m]=tv.split(':').map(Number);ts=new Date(d.getFullYear(),d.getMonth(),d.getDate(),h,m,0).getTime();}
  let gcalEventId=null;
  if(addCalSync) gcalEventId=await gcalCreate(name,ts,addAllDay);
  closeAddEvent();
  await push(itemsRef,{name,checked:false,ts:Date.now(),alarmTs:ts,allDay:addAllDay||null,gcalEventId:gcalEventId||null});
  setTimeout(refreshDayPopup,400);
};

// ── ADD MIC ───────────────────────────────────────────────
const MIC_OFF='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="9" y1="22" x2="15" y2="22"/></svg>';
const MIC_ON='<svg width="17" height="17" viewBox="0 0 24 24" fill="#f87171" stroke="#f87171" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="9" y1="22" x2="15" y2="22"/></svg>';
window.toggleAddMic=function(){
  if(addMicActive){if(addMicRec)addMicRec.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR)return;
  addMicRec=new SR();addMicRec.lang='es-ES';addMicRec.interimResults=false;
  addMicActive=true;
  const btn=document.getElementById('addMicBtn');
  btn.style.background='#fff0f0';btn.style.borderColor='#f87171';btn.innerHTML=MIC_ON;
  addMicRec.onresult=e=>{
    let t=e.results[0][0].transcript.trim();
    const pre=['añadir ','agregar ','poner ','recordar '];
    for(const p of pre){if(t.toLowerCase().startsWith(p)){t=t.slice(p.length).trim();break;}}
    t=t.charAt(0).toUpperCase()+t.slice(1);
    document.getElementById('addInput').value=t;
  };
  addMicRec.onerror=()=>{};
  addMicRec.onend=()=>{
    addMicActive=false;
    const b=document.getElementById('addMicBtn');
    if(b){b.style.background='';b.style.borderColor='';b.innerHTML=MIC_OFF;}
  };
  addMicRec.start();
};

// ── RESCHEDULE ────────────────────────────────────────────
window.openResched=function(id){
  reschedId=id;
  const item=items[id]||{};
  document.getElementById('reschedTitle').textContent=item.name||'Reprogramar';
  const ts=item.alarmTs?new Date(item.alarmTs):new Date();
  document.getElementById('reschedDate').value=ts.getFullYear()+'-'+pad(ts.getMonth()+1)+'-'+pad(ts.getDate());
  document.getElementById('reschedTime').value=pad(ts.getHours())+':'+pad(ts.getMinutes());
  reschedAllDay=!!item.allDay;
  const adc=document.getElementById('reschedAllDayChk'),ti=document.getElementById('reschedTime');
  if(reschedAllDay){adc.className='chk-box on';adc.textContent='✓';ti.style.display='none';}
  else{adc.className='chk-box';adc.textContent='';ti.style.display='block';}
  reschedCalSync=!!(item.gcalEventId&&getGcalToken())||!!getGcalToken();
  const cac=document.getElementById('reschedCalChk');
  if(reschedCalSync){cac.className='chk-box on';cac.textContent='✓';}
  else{cac.className='chk-box';cac.textContent='';}
  document.getElementById('reschedOverlay').classList.add('open');
};
window.closeResched=()=>document.getElementById('reschedOverlay').classList.remove('open');
window.toggleReschedAllDay=function(){
  reschedAllDay=!reschedAllDay;
  const chk=document.getElementById('reschedAllDayChk'),ti=document.getElementById('reschedTime');
  if(reschedAllDay){chk.className='chk-box on';chk.textContent='✓';ti.style.display='none';}
  else{chk.className='chk-box';chk.textContent='';ti.style.display='block';}
};
window.toggleReschedCalSync=function(){
  reschedCalSync=!reschedCalSync;
  const chk=document.getElementById('reschedCalChk');
  if(reschedCalSync){chk.className='chk-box on';chk.textContent='✓';}
  else{chk.className='chk-box';chk.textContent='';}
};
window.saveResched=async function(){
  if(!reschedId)return;
  const dv=document.getElementById('reschedDate').value; if(!dv)return;
  const [y,mo,d]=dv.split('-').map(Number);
  let ts;
  if(reschedAllDay){ts=new Date(y,mo-1,d,0,0,0).getTime();}
  else{const tv=document.getElementById('reschedTime').value||'09:00';const[h,m]=tv.split(':').map(Number);ts=new Date(y,mo-1,d,h,m,0).getTime();}
  closeResched();
  const item=items[reschedId]||{};
  const changes={alarmTs:ts,allDay:reschedAllDay||null};
  if(reschedCalSync&&getGcalToken()){
    if(item.gcalEventId) gcalUpdate(item.gcalEventId,item.name||'',ts,reschedAllDay);
    else { const gid=await gcalCreate(item.name||'',ts,reschedAllDay); if(gid)changes.gcalEventId=gid; }
  } else if(!reschedCalSync&&item.gcalEventId&&getGcalToken()){
    gcalDelete(item.gcalEventId); changes.gcalEventId=null;
  }
  if(items[reschedId]){items[reschedId].alarmTs=ts;items[reschedId].allDay=reschedAllDay||null;}
  await update(iref(reschedId),changes);
  toast('✓ Reprogramado');
};

window.addEventListener('resize',()=>render());
</script>
