<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json"/>
  
  <title>BESTGAS</title>
  <style>
    :root {
      --primary: #2563eb;
      --success: #16a34a;
      --highlight: #fefce8;
      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { 
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
      background-color: var(--bg-body);
      color: var(--text-main);
      line-height: 1.5;
    }

    .container { max-width: 1000px; margin: 0 auto; padding: 2rem 1rem; }

    header { display: flex; align-items: center; gap: 15px; margin-bottom: 2rem; }
    .header-logo { width: 50px; height: 50px; object-fit: contain; }
    header div h1 { font-size: 1.8rem; font-weight: 700; color: var(--text-main); margin-bottom: 0px; }
    .subtitle { font-size: 0.95rem; color: var(--text-muted); }

    .search-row { 
      display: flex; 
      gap: 12px; 
      margin-bottom: 1.5rem; 
      flex-wrap: wrap;
    }

    .input-wrap { flex: 1; position: relative; min-width: 200px; }

    input[type="text"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      outline: none;
    }

    input[type="text"]:focus { border-color: var(--primary); }

    button {
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius);
      border: none;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    #search-btn { background: var(--primary); color: white; }
    #loc-btn { background: var(--bg-card); border: 1.5px solid var(--border); color: var(--text-main); }
    button:hover { opacity: 0.9; transform: translateY(-1px); }

    .suggest-box {
      position: absolute;
      top: 100%; left: 0; right: 0;
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-top: 5px;
      max-height: 250px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .suggest-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
    .suggest-item:hover { background: #f8fafc; }

    .fuel-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 2rem; }
    .pill {
      font-size: 0.85rem;
      padding: 6px 14px;
      border-radius: 20px;
      background: white;
      border: 1px solid var(--border);
      cursor: pointer;
      color: var(--text-muted);
    }

    .pill.active { background: var(--primary); color: white; border-color: var(--primary); font-weight: 600; }

    #status { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1rem; min-height: 20px; }
    #results { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
      gap: 1.5rem; 
    }

    .station-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 1.5rem;
      border: 1px solid var(--border);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .station-card.rank-1 { 
      border: 2px solid var(--success); 
      background-color: var(--highlight);
    }
    
    .rank-badge {
      position: absolute; top: 12px; right: 12px;
      font-size: 0.7rem; font-weight: 700;
      padding: 4px 8px; border-radius: 6px;
    }
    .rank-1 .rank-badge { background: #fef08a; color: #854d0e; border: 1px solid #eab308; }
    .rank-other .rank-badge { background: #f1f5f9; color: var(--text-muted); }

    .station-name { font-weight: 700; margin-bottom: 0.25rem; padding-right: 60px; }
    .station-address { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem; }
    .price-main { font-size: 2rem; font-weight: 800; color: var(--text-main); }
    .price-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 15px; }
    
    .btn-maps {
      margin-top: auto;
      background: #f1f5f9;
      color: #475569;
      text-decoration: none;
      padding: 8px;
      border-radius: 8px;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .btn-maps:hover { background: #e2e8f0; }

    .horario { font-size: 0.7rem; color: var(--text-muted); margin-top: 10px; text-align: center; }

    svg.icon { width: 16px; height: 16px; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <img src="https://doctoruben.github.io/mi-lista/gas.png" alt="Logo" class="header-logo">
    <div>
      <h2>BESTGAS</h2>
      
    </div>
  </header>

  <div class="search-row">
    <div class="input-wrap">
      <input type="text" id="muni-input" placeholder="Escribe un municipio..." oninput="onInput()" autocomplete="off">
      <div class="suggest-box" id="suggest-box" style="display:none"></div>
    </div>
    <button id="search-btn" onclick="buscar()">Buscar</button>
    <button id="loc-btn" onclick="buscarPorUbicacion()">
      <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="8" r="3"/><line x1="8" y1="1" x2="8" y2="3"/><line x1="8" y1="13" x2="8" y2="15"/><line x1="1" y1="8" x2="3" y2="8"/><line x1="13" y1="8" x2="15" y2="8"/></svg>
      Cerca de mí
    </button>
  </div>

  <div class="fuel-pills" id="fuel-pills"></div>
  <div id="status">Cargando municipios...</div>
  <div id="results"></div>
</div>

<script>
const FUELS = [
  { key: 'Precio Gasolina 95 E5', label: 'Gasolina 95' },
  { key: 'Precio Gasoleo A', label: 'Diésel' },
  { key: 'Precio Gasolina 98 E5', label: 'Gasolina 98' },
  { key: 'Precio Gases licuados del petroleo', label: 'GLP' },
  { key: 'Precio Gasoleo Premium', label: 'Diésel Premium' }
];

let selectedFuel = FUELS[0];
let allMunicipios = [];
let selectedMunicipio = null;
let stationsData = [];
let suggestTimeout;

const statusEl = document.getElementById('status');
const resultsEl = document.getElementById('results');
const suggestBox = document.getElementById('suggest-box');
const muniInput = document.getElementById('muni-input');

FUELS.forEach((f, i) => {
  const p = document.createElement('div');
  p.className = 'pill' + (i === 0 ? ' active' : '');
  p.textContent = f.label;
  p.onclick = () => {
    selectedFuel = f;
    document.querySelectorAll('.pill').forEach(el => el.classList.remove('active'));
    p.classList.add('active');
    renderResults();
  };
  document.getElementById('fuel-pills').appendChild(p);
});

async function loadMunicipios() {
  try {
    const r = await fetch('https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/Listados/Municipios/');
    allMunicipios = await r.json();
    statusEl.textContent = "Listo.";
  } catch(e) { statusEl.textContent = "Error de red."; }
}

function normalize(s) {
  return (s || '').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function onInput() {
  clearTimeout(suggestTimeout);
  suggestTimeout = setTimeout(() => {
    const val = muniInput.value;
    if (!val || val.length < 2) { suggestBox.style.display = 'none'; return; }
    const v = normalize(val);
    const matches = allMunicipios.filter(m => normalize(m.Municipio).includes(v)).slice(0, 10);
    suggestBox.innerHTML = matches.map(m => `
      <div class="suggest-item" onclick="selectMuni('${m.Municipio}', '${m.IDMunicipio}')">${m.Municipio}</div>
    `).join('');
    suggestBox.style.display = matches.length ? 'block' : 'none';
  }, 200);
}

function selectMuni(name, id) {
  muniInput.value = name;
  selectedMunicipio = { Municipio: name, IDMunicipio: id };
  suggestBox.style.display = 'none';
  buscar();
}

async function buscar() {
  if (!selectedMunicipio) return;
  statusEl.textContent = 'Buscando precios...';
  try {
    const r = await fetch(`https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroMunicipio/${selectedMunicipio.IDMunicipio}`);
    const data = await r.json();
    stationsData = data.ListaEESSPrecio || [];
    renderResults();
  } catch(e) { statusEl.textContent = 'Error al cargar.'; }
}

function renderResults() {
  const key = selectedFuel.key;
  const filtered = stationsData
    .filter(s => s[key])
    .map(s => ({ ...s, _price: parseFloat(s[key].replace(',', '.')) }))
    .sort((a, b) => a._price - b._price);

  if (!filtered.length) {
    resultsEl.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:2rem;">Sin datos para ${selectedFuel.label}.</div>`;
    return;
  }

  statusEl.textContent = `${filtered.length} resultados en ${selectedMunicipio.Municipio}`;
  resultsEl.innerHTML = filtered.slice(0, 15).map((s, i) => {
    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s['Dirección'] + ' ' + s['Municipio'])}`;
    return `
      <div class="station-card ${i === 0 ? 'rank-1' : 'rank-other'}">
        <span class="rank-badge">${i === 0 ? '#1' : '#' + (i + 1)}</span>
        <div class="station-name">${s['Rótulo']}</div>
        <div class="station-address">${s['Dirección']}</div>
        <div class="price-main">${s._price.toFixed(3).replace('.', ',')} €/L</div>
        <div class="price-label">${selectedFuel.label}</div>
        
        <a href="${mapsUrl}" target="_blank" class="btn-maps">
          📍 Ver en Google Maps
        </a>
        <div class="horario">🕒 ${s['Horario'] || 'Sin horario'}</div>
      </div>
    `;
  }).join('');
}

async function buscarPorUbicacion() {
  if (!navigator.geolocation) return;
  const btn = document.getElementById('loc-btn');
  btn.disabled = true;
  statusEl.textContent = "Localizando...";

  navigator.geolocation.getCurrentPosition(async (pos) => {
    try {
      const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json&accept-language=es`);
      const geoData = await geoRes.json();
      const city = geoData.address.city || geoData.address.town || geoData.address.village;
      const match = allMunicipios.find(m => normalize(m.Municipio) === normalize(city));
      if (match) selectMuni(match.Municipio, match.IDMunicipio);
      else statusEl.textContent = "No se detectó el municipio.";
    } catch(e) { statusEl.textContent = "Error."; }
    btn.disabled = false;
  }, () => {
    btn.disabled = false;
    statusEl.textContent = "Sin acceso a ubicación.";
  });
}

loadMunicipios().then(() => {
  const match = allMunicipios.find(m => normalize(m.Municipio) === 'INGENIO');
  if (match) selectMuni(match.Municipio, match.IDMunicipio);
});

document.addEventListener('click', e => { if (!e.target.closest('.input-wrap')) suggestBox.style.display = 'none'; });
</script>
  <script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/mi-lista/mementov2/sw.js')
      .then(r=>{r.update();r.addEventListener('updatefound',()=>{const w=r.installing;w.addEventListener('statechange',()=>{if(w.state==='activated')location.reload();});});})
      .catch(()=>{});
    navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload());
  });
}
</script>
</body>
</html>
