<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Setup MEMENTO</title>
<style>body{font-family:sans-serif;background:#141210;color:#f0ebe0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
.box{background:#1a1714;border:1px solid #2e2720;border-radius:16px;padding:32px;max-width:360px;text-align:center;}
h2{color:#c9a84c;margin-bottom:12px;}p{color:#8a7a60;font-size:14px;margin-bottom:20px;}
.btn{background:linear-gradient(90deg,#c9a84c,#a8832a);color:#0d0b09;border:none;border-radius:10px;padding:12px 24px;font-size:15px;font-weight:900;cursor:pointer;}
.ok{color:#4ade80;font-weight:700;margin-top:12px;display:none;}
.err{color:#f87171;font-weight:700;margin-top:12px;display:none;}</style>
</head>
<body>
<div class="box">
  <h2>⚙️ Setup inicial MEMENTO</h2>
  <p>Registra a <strong>ruben</strong> como administrador de MEMENTO.<br>Ejecuta esto solo una vez.</p>
  <button class="btn" onclick="setup()">Ejecutar setup</button>
  <div class="ok" id="ok">✓ ¡Listo! Ruben tiene acceso a MEMENTO.<br>Puedes borrar este archivo.</div>
  <div class="err" id="err"></div>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const FB_CONFIG = {
    apiKey:      'AIzaSyBnmTgJYFsFAFWnGyaDZRUxOZGnL5SE1QA',
    projectId:   'lista-compra-9d6f5',
    appId:       '1:241322134457:web:1b765857911f94d69cc468',
    authDomain:  'lista-compra-9d6f5.firebaseapp.com',
    databaseURL: 'https://lista-compra-9d6f5-default-rtdb.europe-west1.firebasedatabase.app'
  };

  const app  = initializeApp(FB_CONFIG, 'memento-setup');
  const db   = getDatabase(app);
  const auth = getAuth(app);

  window.setup = async function() {
    try {
      // Autenticar como ruben
      const cred = await signInWithEmailAndPassword(auth, 'ruben@milista.app', 'Mimi2026');
      // Añadir a memento_usuarios/
      await set(ref(db, 'memento_usuarios/ruben'), {
        uid: cred.user.uid,
        admin: true,
        createdAt: Date.now()
      });
      document.getElementById('ok').style.display = 'block';
    } catch(e) {
      const err = document.getElementById('err');
      err.textContent = 'Error: ' + e.message;
      err.style.display = 'block';
    }
  };
</script>
</body>
</html>
