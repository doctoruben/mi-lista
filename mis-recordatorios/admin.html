<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚙️ Administración — MEMENTO</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Abril+Fatface&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(135deg, #0d0b09 0%, #141210 50%, #0d0b09 100%); font-family: 'Nunito', sans-serif; color: #f0ebe0; min-height: 100vh; }
    .wrap { max-width: 520px; margin: 0 auto; padding: 24px 16px 60px; }
    h1 { font-family: 'Abril Fatface', serif; font-size: 28px; color: #f5f0e8; margin-bottom: 4px; }
    .subtitle { color: #5a4a35; font-size: 13px; margin-bottom: 28px; }

    /* LOGIN */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #141210; border-radius: 20px; padding: 24px; border: 1px solid #2e2720; margin-bottom: 20px; }
    .card h2 { font-family: 'Abril Fatface', serif; font-size: 20px; color: #f5f0e8; margin-bottom: 16px; }
    label { display: block; font-size: 11px; font-weight: 800; color: #8a7a60; letter-spacing: 0.5px; margin-bottom: 5px; margin-top: 10px; }
    input, select { width: 100%; background: #0d0b09; border: 1px solid #2e2720; border-radius: 10px; padding: 10px 14px; color: #f0ebe0; font-size: 15px; font-family: inherit; outline: none; }
    input:focus, select:focus { border-color: #c9a84c; }
    .btn { display: block; width: 100%; margin-top: 14px; background: linear-gradient(90deg, #c9a84c, #a8832a); color: #0d0b09; border: none; border-radius: 12px; padding: 12px; font-size: 15px; font-weight: 900; font-family: inherit; cursor: pointer; }
    .btn-secondary { background: #141210; color: #8a7a60; border: 1px solid #2e2720; border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; }
    .btn-danger { background: #450a0a; color: #fca5a5; border: none; border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; }
    .error { color: #f87171; font-size: 13px; font-weight: 700; margin-top: 8px; display: none; }

    /* SECTIONS */
    .section-title { font-size: 11px; font-weight: 900; color: #6b5c42; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
    .user-row { display: flex; align-items: center; gap: 10px; background: #0d0b09; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; border: 1px solid #2e2720; }
    .user-info { flex: 1; }
    .user-name { font-size: 15px; font-weight: 700; color: #f0ebe0; }
    .user-meta { font-size: 11px; color: #5a4a35; margin-top: 2px; }
    .lista-row { display: flex; align-items: center; gap: 10px; background: #0d0b09; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; border: 1px solid #2e2720; }
    .badge { background: #2a1f08; color: #c9a84c; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 800; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #2e2720; background: #0d0b09; color: #6b5c42; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; text-align: center; }
    .tab.active { background: #2a1f08; color: #c9a84c; border-color: #c9a84c; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .divider { border: none; border-top: 1px solid #141210; margin: 16px 0; }
  </style>
</head>

  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
           deleteUser as fbDeleteUser, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const FB_CONFIG = {
    apiKey:      'AIzaSyBnmTgJYFsFAFWnGyaDZRUxOZGnL5SE1QA',
    projectId:   'lista-compra-9d6f5',
    appId:       '1:241322134457:web:1b765857911f94d69cc468',
    authDomain:  'lista-compra-9d6f5.firebaseapp.com',
    databaseURL: 'https://lista-compra-9d6f5-default-rtdb.europe-west1.firebasedatabase.app'
  };

  const ADMIN_EMAIL = 'admin@milista.app';

    const _app = initializeApp(FB_CONFIG, 'memento-admin');
  const db   = getDatabase(_app);
  const auth = getAuth(_app);

  let usuarios    = {};
  let listas      = [];
  let _adminPass  = '';

  document.getElementById('a_pass').addEventListener('input', e => { _adminPass = e.target.value; });

  // ── LOGIN ────────────────────────────────────────────────
  window.adminLogin = async function() {
    const pass = document.getElementById('a_pass').value.trim();
    const err  = document.getElementById('loginErr');
    err.style.display = 'none';
    if (!pass) return;
    try {
      await signInWithEmailAndPassword(auth, ADMIN_EMAIL, pass);
      document.getElementById('loginWrap').style.display  = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      initAdmin();
    } catch(e) {
      err.style.display = 'block';
    }
  };

  document.getElementById('a_pass').addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });

  function initAdmin() {
    onValue(ref(db, 'usuarios_config'), snap => {
      usuarios = snap.val() || {};
      renderUsers();
      refreshListaSelect();
    });
    onValue(ref(db, 'listas'), snap => {
      const data = snap.val() || {};
      listas = Object.keys(data);
      renderListas();
      refreshListaSelect();
    });
  }

  // ── RENDER USERS ─────────────────────────────────────────
  function renderUsers() {
    const container = document.getElementById('usersList');
    const keys = Object.keys(usuarios);
    if (keys.length === 0) {
      container.innerHTML = '<p style="color:#5a4a35; font-size:13px;">No hay usuarios aún.</p>';
      return;
    }
    container.innerHTML = keys.map(key => {
      const u = usuarios[key];
      const userListas = Array.isArray(u.listas) ? u.listas : (u.lista ? [u.lista] : []);
      const listasHtml = userListas.length > 0
        ? userListas.map(l => `<span class="badge">📋 ${l}</span>`).join(' ')
        : '<span style="color:#5a4a35; font-size:11px;">Sin listas</span>';
      return `
        <div class="user-row" id="urow-${key}">
          <div class="user-info">
            <div class="user-name">👤 ${key}</div>
            <div class="user-meta" style="display:flex; flex-wrap:wrap; gap:4px; margin-top:4px;">${listasHtml}</div>
          </div>
          <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-end;">
            <button class="btn-secondary" onclick="toggleEditUser('${key}')" style="font-size:11px; padding:5px 10px;">✏️ Editar</button>
            <button class="btn-danger" onclick="deleteUser('${key}')">🗑 Borrar</button>
          </div>
        </div>
        <div id="uedit-${key}" style="display:none; background:#0d0b09; border-radius:12px; padding:14px; margin-top:-6px; margin-bottom:8px; border:1px solid #2e2720;">
          <div style="font-size:11px; font-weight:800; color:#6b5c42; letter-spacing:0.5px; margin-bottom:8px;">LISTAS ASIGNADAS A ${key.toUpperCase()}</div>
          <div id="uedit-listas-${key}" style="display:flex; flex-direction:column; gap:6px;"></div>
          <button onclick="saveUserListas('${key}')" style="margin-top:12px; background:linear-gradient(90deg, #c9a84c, #a8832a); color:#fff; border:none; border-radius:10px; padding:9px 16px; font-size:14px; font-weight:900; font-family:inherit; cursor:pointer; width:100%;">✓ Guardar</button>
        </div>`;
    }).join('');
  }

  window.toggleEditUser = function(key) {
    const editDiv = document.getElementById(`uedit-${key}`);
    const isOpen = editDiv.style.display !== 'none';
    editDiv.style.display = isOpen ? 'none' : 'block';
    if (!isOpen) {
      const u = usuarios[key];
      const userListas = Array.isArray(u.listas) ? u.listas : (u.lista ? [u.lista] : []);
      const container = document.getElementById(`uedit-listas-${key}`);
      container.innerHTML = listas.map(l => `
        <label style="display:flex; align-items:center; gap:10px; cursor:pointer; margin:0; font-size:14px; font-weight:700; color:#f0ebe0;">
          <input type="checkbox" value="${l}" ${userListas.includes(l) ? 'checked' : ''}
            style="width:auto; accent-color:#c9a84c;" />
          📋 ${l}
        </label>`).join('');
    }
  };

  window.saveUserListas = async function(key) {
    const checked = [...document.querySelectorAll(`#uedit-listas-${key} input:checked`)];
    const sel = checked.map(c => c.value);
    if (sel.length === 0) { alert('Selecciona al menos una lista'); return; }
    await update(ref(db, `usuarios_config/${key}`), { listas: sel });
    document.getElementById(`uedit-${key}`).style.display = 'none';
  };

  // ── RENDER LISTAS ─────────────────────────────────────────
  function renderListas() {
    const container = document.getElementById('listasList');
    if (listas.length === 0) {
      container.innerHTML = '<p style="color:#5a4a35; font-size:13px;">No hay listas aún.</p>';
      return;
    }
    container.innerHTML = listas.map(name => {
      const usersInList = Object.entries(usuarios)
        .filter(([, u]) => {
          const ul = Array.isArray(u.listas) ? u.listas : (u.lista ? [u.lista] : []);
          return ul.includes(name);
        })
        .map(([k]) => k);
      return `
        <div class="lista-row">
          <div style="flex:1;">
            <div style="font-size:15px; font-weight:700; color:#f0ebe0;">🔔 ${name}</div>
            <div style="font-size:11px; color:#5a4a35; margin-top:2px;">
              ${usersInList.length > 0 ? '👤 ' + usersInList.join(', ') : 'Sin usuarios'}
            </div>
          </div>
          <button class="btn-danger" onclick="deleteLista('${name}')">🗑 Borrar</button>
        </div>`;
    }).join('');
  }

  function refreshListaSelect() {
    const container = document.getElementById('nu_listas');
    if (!container) return;
    container.innerHTML = listas.map(l => `
      <label style="display:flex; align-items:center; gap:10px; cursor:pointer; margin:0; font-size:14px; font-weight:700; color:#f0ebe0;">
        <input type="checkbox" value="${l}" style="width:auto; accent-color:#c9a84c;" />
        📋 ${l}
      </label>`).join('');
  }

  // ── CREAR USUARIO ────────────────────────────────────────
  window.createUser = async function() {
    const user  = document.getElementById('nu_user').value.trim().toLowerCase();
    const pass  = document.getElementById('nu_pass').value.trim();
    const err   = document.getElementById('createErr');
    const checked = [...document.querySelectorAll('#nu_listas input[type=checkbox]:checked')];
    const listas_sel = checked.map(c => c.value);
    if (!user || !pass) { err.textContent = 'Rellena nombre y contraseña'; err.style.display = 'block'; return; }
    if (listas_sel.length === 0) { err.textContent = 'Selecciona al menos una lista'; err.style.display = 'block'; return; }
    if (usuarios[user]) { err.textContent = 'Ese usuario ya existe'; err.style.display = 'block'; return; }
    err.style.display = 'none';
    try {
      const email = `${user}@milista.app`;
      const cred  = await createUserWithEmailAndPassword(auth, email, pass);
      const uid   = cred.user.uid;
      await set(ref(db, `usuarios_config/${user}`), { uid, listas: listas_sel });
      document.getElementById('nu_user').value = '';
      document.getElementById('nu_pass').value = '';
      document.querySelectorAll('#nu_listas input[type=checkbox]').forEach(c => c.checked = false);
      await signInWithEmailAndPassword(auth, ADMIN_EMAIL, _adminPass);
    } catch(e) {
      err.textContent = e.code === 'auth/email-already-in-use'
        ? 'Ese usuario ya existe en el sistema'
        : `Error: ${e.message}`;
      err.style.display = 'block';
    }
  };

  // ── ELIMINAR USUARIO ─────────────────────────────────────
  window.deleteUser = async function(key) {
    const pass = prompt(`Para eliminar "${key}" introduce su contraseña actual:`);
    if (!pass) return;
    if (!confirm(`¿Eliminar usuario "${key}"? Esta acción no se puede deshacer.`)) return;
    try {
      const email = `${key}@milista.app`;
      const tempCred = await signInWithEmailAndPassword(auth, email, pass);
      await tempCred.user.delete();
      await signInWithEmailAndPassword(auth, ADMIN_EMAIL, _adminPass);
      await remove(ref(db, `usuarios_config/${key}`));
    } catch(e) {
      try { await signInWithEmailAndPassword(auth, ADMIN_EMAIL, _adminPass); } catch {}
      alert(e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential'
        ? 'Contraseña incorrecta'
        : `Error al eliminar: ${e.message}`);
    }
  };

  // ── CREAR LISTA ──────────────────────────────────────────
  window.createLista = function() {
    const name = document.getElementById('nl_name').value.trim().replace(/\s+/g, '_');
    const err  = document.getElementById('listaErr');
    if (!name) { err.textContent = 'Escribe un nombre'; err.style.display = 'block'; return; }
    if (listas.includes(name)) { err.textContent = 'Esa lista ya existe'; err.style.display = 'block'; return; }
    err.style.display = 'none';
    set(ref(db, `listas/${name}/_created`), Date.now());
    document.getElementById('nl_name').value = '';
  };

  // ── ELIMINAR LISTA ───────────────────────────────────────
  window.deleteLista = async function(name) {
    if (!confirm(`¿Eliminar lista "${name}" y todos sus recordatorios?`)) return;
    try {
      await remove(ref(db, `listas/${name}`));
      const updates = {};
      Object.entries(usuarios).forEach(([uKey, u]) => {
        const userListas = Array.isArray(u.listas) ? u.listas : (u.lista ? [u.lista] : []);
        if (userListas.includes(name)) {
          updates[`usuarios_config/${uKey}/listas`] = userListas.filter(l => l !== name);
        }
      });
      if (Object.keys(updates).length > 0) await update(ref(db, '/'), updates);
    } catch(e) {
      alert('Error al eliminar lista: ' + e.message);
    }
  };

  window.showTab = function(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['usuarios','listas'][i] === tab));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
  };
</script>
</body>
</html>
