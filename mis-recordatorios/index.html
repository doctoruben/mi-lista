<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MEMENTO" />
  <meta name="theme-color" content="#0f0d0b" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.png" />
  <title>MEMENTO</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Abril+Fatface&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: #141210;
      font-family: 'Nunito', sans-serif;
      color: #f0ebe0;
      overscroll-behavior: none;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #141210; }
    ::-webkit-scrollbar-thumb { background: #5a4a35; border-radius: 2px; }
    .app { max-width: 480px; margin: 0 auto; padding: 0 16px 120px; }

    /* LOGIN */
    .setup-screen {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px; text-align: center;
    }
    .setup-card {
      background: #1a1714; border-radius: 24px; padding: 28px 24px;
      border: 1px solid #2e2720; max-width: 440px; width: 100%;
    }
    .setup-card p { color: #6b5c42; font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
    .setup-field { margin-bottom: 12px; text-align: left; }
    .setup-field label { display: block; font-size: 12px; font-weight: 800; color: #8a7a60; margin-bottom: 5px; letter-spacing: 0.5px; }
    .setup-field input {
      width: 100%; background: #0d0b09; border: 1px solid #2e2720; border-radius: 10px;
      padding: 10px 12px; color: #f0ebe0; font-size: 15px; font-family: inherit; outline: none;
    }
    .setup-field input:focus { border-color: #c9a84c; }
    .setup-btn {
      width: 100%; background: linear-gradient(90deg, #c9a84c, #a8832a);
      color: #0d0b09; border: none; border-radius: 12px; padding: 13px;
      font-size: 15px; font-weight: 900; font-family: inherit; cursor: pointer; margin-top: 4px;
    }
    .setup-btn:active { opacity: 0.85; }

    /* SYNC */
    .sync-bar { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 6px 0 0; font-size: 11px; font-weight: 700; color: #5a4a35; }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #5a4a35; transition: background 0.3s; }
    .sync-dot.online { background: #4ade80; box-shadow: 0 0 6px #4ade8088; }
    .sync-dot.syncing { background: #c9a84c; box-shadow: 0 0 6px #c9a84c88; animation: pulse 0.8s infinite; }
    .sync-dot.error { background: #f87171; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .header { padding: 20px 0 14px; text-align: center; }
    .header-top { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 4px; }
    .stats { color: #6b5c42; font-size: 14px; text-align: center; margin-top: 4px; }
    .stats .pending { color: #c9a84c; font-weight: 800; }
    .stats .done { color: #4ade80; font-weight: 800; }

    .add-card {
      background: #1a1714; border-radius: 20px; padding: 16px;
      border: 1px solid #2e2720; box-shadow: 0 4px 24px rgba(0,0,0,0.4); margin-bottom: 14px;
    }
    .input-row { display: flex; gap: 8px; align-items: stretch; }
    .main-input {
      flex: 1; background: #0d0b09; border: 1px solid #2e2720; border-radius: 12px;
      padding: 12px 14px; color: #f0ebe0; font-size: 16px; font-family: inherit; outline: none;
    }
    .main-input::placeholder { color: #5a4a35; }
    .main-input:focus { border-color: #c9a84c; }
    .mic-btn {
      background: #0d0b09; border: 1px solid #2e2720; border-radius: 12px;
      width: 48px; min-width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer; flex-shrink: 0; transition: all 0.15s;
    }
    .mic-btn:active { background: #2e2720; }
    .add-btn {
      width: 100%; background: linear-gradient(90deg, #c9a84c, #a8832a);
      color: #0d0b09; border: none; border-radius: 12px;
      padding: 13px; font-size: 16px; font-weight: 900;
      font-family: inherit; cursor: pointer; transition: transform 0.1s; margin-top: 10px;
    }
    .add-btn:active { transform: scale(0.97); }

    .filters { display: flex; gap: 8px; margin-bottom: 14px; }
    .filter-btn {
      flex: 1; padding: 10px 0; border-radius: 12px; font-size: 12px; font-weight: 800;
      font-family: inherit; background: #1a1714; color: #6b5c42; border: 1px solid #2e2720;
      cursor: pointer; transition: all 0.15s;
    }
    .filter-btn.active { background: #c9a84c; color: #0d0b09; border-color: #c9a84c; }

    .items { display: flex; flex-direction: column; gap: 8px; }
    .empty { text-align: center; color: #5a4a35; padding: 40px 0; font-size: 15px; }

    .item {
      display: flex; align-items: flex-start; gap: 12px;
      background: #1a1714; border-radius: 16px; padding: 14px;
      border: 1px solid #2e2720; transition: all 0.25s;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideUp { from { opacity:0; transform:translateX(-50%) translateY(20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    .item.checked { background: #0d0b09; border-color: #1a1714; opacity: 0.5; }
    .check-btn {
      width: 30px; height: 30px; border-radius: 9px; border: 2px solid #5a4a35;
      background: transparent; cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: all 0.2s; font-size: 16px; color: #0d0b09;
      margin-top: 2px;
    }
    .check-btn.checked { border-color: #c9a84c; background: #c9a84c; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-weight: 700; font-size: 16px; color: #f0ebe0; white-space: normal; word-break: break-word; transition: all 0.2s; }
    .item-name.checked { text-decoration: line-through; color: #5a4a35; }
    .item-ts { font-size: 11px; color: #5a4a35; margin-top: 3px; }
    .del-btn {
      background: #450a0a; border: none; color: #fca5a5; border-radius: 10px;
      width: 34px; height: 34px; cursor: pointer; font-size: 20px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s;
      margin-top: 1px;
    }
    .del-btn:active { background: #7f1d1d; }
    .clear-btn {
      width: 100%; margin-top: 10px; background: none; border: 1px dashed #2e2720;
      border-radius: 12px; color: #5a4a35; padding: 12px; font-size: 13px; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: all 0.2s;
    }
    .clear-btn:active { border-color: #f87171; color: #f87171; }
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: #1a1714; border: 1px solid #2e2720; border-radius: 14px;
      padding: 12px 20px; font-size: 14px; font-weight: 700; color: #f0ebe0;
      z-index: 9999; white-space: nowrap; pointer-events: none;
      animation: slideUp 0.3s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .user-bar { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .user-pill {
      display: flex; align-items: center; gap: 6px; background: #0d0b09;
      border: 1px solid #2e2720; border-radius: 20px; padding: 5px 12px;
      font-size: 12px; font-weight: 800; color: #8a7a60;
    }
    .user-avatar {
      width: 24px; height: 24px; border-radius: 50%; background: #2a1f08;
      display: none; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0;
    }
    .action-btn {
      background: #0d0b09; border: 1px solid #2e2720; border-radius: 20px;
      padding: 5px 12px; font-size: 12px; font-weight: 800; color: #8a7a60;
      cursor: pointer; font-family: inherit; transition: all 0.15s; display: none;
    }
    .action-btn:active { border-color: #c9a84c; color: #c9a84c; }
    .admin-btn { color: #c9a84c; border-color: #5a3a0a; }
    .group-header { display: flex; align-items: center; gap: 8px; padding: 14px 4px 8px; }
    .group-title { font-size: 11px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; color: #8a7a60; }
    .group-line { flex: 1; height: 1px; background: #2e2720; }
    .group-count { font-size: 11px; font-weight: 800; color: #5a4a35; background: #1a1714; border-radius: 20px; padding: 2px 8px; }
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .app { padding-bottom: calc(120px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, remove, update }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInWithEmailAndPassword, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const FB_CONFIG = {
    apiKey:      'AIzaSyBnmTgJYFsFAFWnGyaDZRUxOZGnL5SE1QA',
    projectId:   'lista-compra-9d6f5',
    appId:       '1:241322134457:web:1b765857911f94d69cc468',
    authDomain:  'lista-compra-9d6f5.firebaseapp.com',
    databaseURL: 'https://lista-compra-9d6f5-default-rtdb.europe-west1.firebasedatabase.app'
  };

  const app  = initializeApp(FB_CONFIG, 'memento');
  const db   = getDatabase(app);
  const auth = getAuth(app);

  let items = {};
  let currentFilter = 'todos';
  let itemsRef;

  // ── SESSION ──────────────────────────────────────────────
  function loadSession() {
    try { return JSON.parse(localStorage.getItem('mrSession') || 'null'); } catch { return null; }
  }

  // ── LOGIN ────────────────────────────────────────────────
  window.doLogin = async function() {
    const user = document.getElementById('l_user').value.trim().toLowerCase();
    const pass = document.getElementById('l_pass').value.trim();
    if (!user || !pass) return;
    document.getElementById('loginError').style.display = 'none';
    try {
      await signInWithEmailAndPassword(auth, user + '@milista.app', pass);
      // Verificar que el usuario existe en la BD
      const snap = await new Promise(res => onValue(ref(db, 'usuarios_config/' + user), res, {onlyOnce:true}));
      if (!snap.val()) {
        document.getElementById('loginError').style.display = 'block';
        await signOut(auth);
        return;
      }
      localStorage.setItem('mrSession', JSON.stringify({user, pass}));
      window.location.reload();
    } catch(e) {
      document.getElementById('loginError').style.display = 'block';
    }
  };

  window.resetConfig = function() {
    if (confirm('¿Cerrar sesión?')) {
      signOut(auth);
      localStorage.removeItem('mrSession');
      window.location.reload();
    }
  };

  // ── INIT ─────────────────────────────────────────────────
  const session = loadSession();
  if (!session) {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('l_pass').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
    document.getElementById('l_user').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('l_pass').focus(); });
  } else {
    document.getElementById('mainApp').style.display = 'block';
    initApp(session);
  }

  async function initApp(session) {
    // Re-autenticar
    try {
      if (!auth.currentUser) {
        await signInWithEmailAndPassword(auth, session.user + '@milista.app', session.pass);
      }
    } catch(e) {
      localStorage.removeItem('mrSession');
      window.location.reload();
      return;
    }

    // UI de usuario
    const badge = document.getElementById('userBadge');
    if (badge) badge.textContent = '👤 ' + session.user.charAt(0).toUpperCase() + session.user.slice(1);
    document.getElementById('logoutBtn').style.display = 'inline-block';
    if (session.user === 'ruben') document.getElementById('adminBtn').style.display = 'inline-block';

    onValue(ref(db, 'usuarios_config/' + session.user + '/avatar'), snap => {
      const avatarEl = document.getElementById('userAvatar');
      const av = snap.val();
      if (av) {
        avatarEl.style.display = 'flex';
        avatarEl.innerHTML = '<img src="' + av + '" style="width:100%;height:100%;object-fit:cover;" />';
        if (badge) badge.textContent = session.user.charAt(0).toUpperCase() + session.user.slice(1);
      }
    });

    // Ruta: listas/{lista}/recordatorios — usamos nombre de usuario como lista
    // Para compatibilidad con las reglas de Firebase que solo permiten listas/
    const listaPath = 'listas/' + session.user + '_recordatorios';
    itemsRef = ref(db, listaPath + '/recordatorios');

    setSyncStatus('syncing', 'Conectando...');
    onValue(itemsRef, snap => {
      items = snap.val() || {};
      setSyncStatus('online', 'Sincronizado');
      render();
    }, () => setSyncStatus('error', 'Error de conexión'));
  }

  function setSyncStatus(state, text) {
    document.getElementById('syncDot').className = 'sync-dot ' + state;
    document.getElementById('syncText').textContent = text;
  }

  function itemRef(id) {
    const session = loadSession();
    const listaPath = 'listas/' + session.user + '_recordatorios';
    return ref(db, listaPath + '/recordatorios/' + id);
  }

  // ── ACCIONES ─────────────────────────────────────────────
  window.addItem = function() {
    const input = document.getElementById('itemInput');
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    const dup = Object.values(items).find(i => !i.checked && i.name.toLowerCase() === name.toLowerCase());
    if (dup) {
      input.style.border = '2px solid #f87171';
      input.placeholder = '⚠️ Ya existe este recordatorio';
      input.value = '';
      setTimeout(() => { input.style.border=''; input.placeholder='Nuevo recordatorio...'; input.focus(); }, 2000);
      return;
    }
    setSyncStatus('syncing', 'Guardando...');
    push(itemsRef, {name, checked: false, ts: Date.now()});
    input.value = '';
    input.focus();
  };

  window.toggleItem = function(id) {
    setSyncStatus('syncing', 'Guardando...');
    const item = items[id];
    if (item) update(itemRef(id), {checked: !item.checked});
  };

  window.removeItem = function(id) {
    setSyncStatus('syncing', 'Guardando...');
    remove(itemRef(id));
  };

  window.clearChecked = function() {
    if (!confirm('¿Eliminar todos los recordatorios realizados?')) return;
    setSyncStatus('syncing', 'Guardando...');
    Object.entries(items).forEach(([id, item]) => {
      if (item.checked) remove(itemRef(id));
    });
  };

  window.setFilter = function(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };

  // ── RENDER ───────────────────────────────────────────────
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function timeAgo(ts) {
    if (!ts) return '';
    const d = Date.now() - ts;
    if (d < 60000) return 'Hace un momento';
    if (d < 3600000) return 'Hace ' + Math.floor(d/60000) + ' min';
    if (d < 86400000) return 'Hace ' + Math.floor(d/3600000) + ' h';
    return new Date(ts).toLocaleDateString('es-ES', {day:'numeric', month:'short'});
  }

  function renderItem(id, item) {
    return '<div class="item' + (item.checked?' checked':'') + '">' +
      '<button class="check-btn' + (item.checked?' checked':'') + '" onclick="toggleItem(\''+id+'\')">' + (item.checked?'✓':'') + '</button>' +
      '<div class="item-info"><div class="item-name' + (item.checked?' checked':'') + '">' + esc(item.name) + '</div>' +
      '<div class="item-ts">' + timeAgo(item.ts) + '</div></div>' +
      '<button class="del-btn" onclick="removeItem(\''+id+'\')">×</button></div>';
  }

  function render() {
    const all = Object.entries(items).sort((a,b) => (b[1].ts||0)-(a[1].ts||0));
    const pending = all.filter(([,i]) => !i.checked);
    const done    = all.filter(([,i]) => i.checked);

    document.getElementById('pendingCount').textContent = pending.length;
    document.getElementById('doneCount').textContent    = done.length;
    const clearBtn = document.getElementById('clearBtn');
    clearBtn.style.display = done.length > 0 ? 'block' : 'none';
    clearBtn.textContent = '🗑 Eliminar ' + done.length + ' recordatorio' + (done.length!==1?'s':'') + ' realizado' + (done.length!==1?'s':'');

    const list = document.getElementById('itemList');
    if (currentFilter === 'pendientes') {
      list.innerHTML = pending.length===0 ? '<div class="empty">¡Todo realizado! 🎉</div>' : pending.map(([id,i])=>renderItem(id,i)).join('');
      return;
    }
    if (currentFilter === 'realizados') {
      list.innerHTML = done.length===0 ? '<div class="empty">Nada realizado aún</div>' : done.map(([id,i])=>renderItem(id,i)).join('');
      return;
    }
    if (all.length===0) { list.innerHTML='<div class="empty">¡Sin recordatorios! Añade uno 🔔</div>'; return; }
    let html = '';
    if (pending.length>0) {
      html += '<div class="group-header"><span class="group-title">Pendientes</span><div class="group-line"></div><span class="group-count">'+pending.length+'</span></div>';
      html += pending.map(([id,i])=>renderItem(id,i)).join('');
    }
    if (done.length>0) {
      html += '<div class="group-header"><span class="group-title">Realizados</span><div class="group-line"></div><span class="group-count">'+done.length+'</span></div>';
      html += done.map(([id,i])=>renderItem(id,i)).join('');
    }
    list.innerHTML = html;
  }

  // ── TOAST ────────────────────────────────────────────────
  window.showToast = function(msg) {
    const e = document.getElementById('_toast');
    if (e) e.remove();
    const t = document.createElement('div');
    t.id = '_toast'; t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  };

  // ── MICRÓFONO ────────────────────────────────────────────
  let _rec = null, _micActive = false;
  window.toggleMic = function() {
    if (_micActive) { if (_rec) _rec.stop(); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showToast('❌ Tu navegador no soporta reconocimiento de voz'); return; }
    _rec = new SR();
    _rec.lang = 'es-ES'; _rec.interimResults = false; _rec.maxAlternatives = 1;
    _micActive = true;
    const btn = document.getElementById('micBtn');
    btn.style.background = '#7f1d1d'; btn.style.borderColor = '#f87171'; btn.textContent = '🔴';
    _rec.onresult = e => {
      const t = e.results[0][0].transcript.trim();
      const prefijos = ['añadir ','agregar ','poner ','meter ','recordar ','apuntar '];
      let nombre = t.toLowerCase();
      for (const p of prefijos) { if (nombre.startsWith(p)) { nombre=nombre.slice(p.length).trim(); break; } }
      nombre = nombre.charAt(0).toUpperCase() + nombre.slice(1);
      const teniaPrefijo = prefijos.some(p => t.toLowerCase().startsWith(p));
      document.getElementById('itemInput').value = nombre;
      if (teniaPrefijo) { addItem(); showToast('✅ "'+nombre+'" añadido por voz'); }
      else { document.getElementById('itemInput').focus(); showToast('🎤 "'+nombre+'" — pulsa Añadir para confirmar'); }
    };
    _rec.onerror = e => { if (e.error!=='no-speech'&&e.error!=='aborted') showToast('❌ Error: '+e.error); };
    _rec.onend = () => {
      _micActive = false;
      const btn = document.getElementById('micBtn');
      if (btn) { btn.style.background='#0d0b09'; btn.style.borderColor='#2e2720'; btn.textContent='🎤'; }
    };
    _rec.start();
  };
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/mi-lista/mis-recordatorios/sw.js').catch(()=>{}));
  }
</script>
</body>
</html>
